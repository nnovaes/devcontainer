# Base tools shared across all personas.
# Copied to /etc/mise/config.toml in the base image stage.
# Persona-specific tools live in containers/personas/<name>.mise.toml
# and are merged via /etc/mise/conf.d/ at build time.
[tools]
# Prompt & shell enhancers
starship   = "latest"
atuin      = "latest"
zoxide     = "latest"
direnv     = "latest"
fzf        = "latest"

# Modern CLI replacements
eza        = "latest"
bat        = "latest"
ripgrep    = "latest"
fd         = "latest"
btop       = "latest"
duf        = "latest"
glow       = "latest"
delta      = "latest"
dust       = "latest"

# Git & GitHub
lazygit    = "latest"
github-cli = "latest"

# Data & Query
jq       = "latest"
yq       = "latest"
yamlfmt  = "latest"
yamllint = "latest"

# Developer Productivity
task       = "latest"
pre-commit = "latest"

# Security
gitleaks   = "latest"
trufflehog = "latest"
step       = "latest"
