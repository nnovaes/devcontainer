version: "3"

vars:
  PERSONA: '{{default "devops" .PERSONA}}'
  CONTAINER_NAME: 'devcontainer-{{.PERSONA}}'
  IMAGE: 'devcontainer:{{.PERSONA}}'
  # apple/container release to install via `task setup`. Bump to upgrade.
  CONTAINER_VERSION: "1.0.0"
  # Chezmoi state dir on Mac — bind-mounted as ~/.config/chezmoi/ in container
  # Persists persona/model/theme prompts across container restarts.
  CHEZMOI_STATE_DIR: '{{.HOME}}/.local/share/devcontainer-chezmoi'

tasks:
  bootstrap:
    desc: "Idempotently install Homebrew (up-to-date), git, and go-task. Run scripts/bootstrap.sh directly on a fresh Mac."
    cmds:
      - bash scripts/bootstrap.sh

  setup:
    desc: "One-command machine bootstrap: install prerequisites + apple/container + chezmoi, start the container service"
    cmds:
      - task: bootstrap
      - command -v chezmoi >/dev/null 2>&1 || brew install chezmoi
      - |
        if command -v container >/dev/null 2>&1; then
          echo "apple/container already installed: $(container --version)"
        else
          echo "Installing apple/container {{.CONTAINER_VERSION}} (signed pkg, requires admin password)..."
          pkg="$(mktemp -d)/container.pkg"
          curl -fsSL -o "$pkg" \
            "https://github.com/apple/container/releases/download/{{.CONTAINER_VERSION}}/container-{{.CONTAINER_VERSION}}-installer-signed.pkg"
          sudo installer -pkg "$pkg" -target /
        fi
      - container system start
      - 'echo "Setup complete. Next: task build PERSONA=devops && task up PERSONA=devops"'

  build:
    desc: "Build a persona image. Usage: task build PERSONA=devops"
    cmds:
      - container build --target {{.PERSONA}} -t {{.IMAGE}} containers/

  up:
    desc: "Start a persona container. Usage: task up PERSONA=devops"
    cmds:
      - mkdir -p {{.CHEZMOI_STATE_DIR}} {{.HOME}}/workspaces {{.HOME}}/.aws
      - |
        if container inspect {{.CONTAINER_NAME}} >/dev/null 2>&1; then
          echo "Container {{.CONTAINER_NAME}} already exists; ensuring it is running."
          container start {{.CONTAINER_NAME}} >/dev/null 2>&1 || true
        else
          container run \
            --name {{.CONTAINER_NAME}} \
            --detach \
            -v {{.HOME}}/workspaces:/workspaces \
            -v {{.HOME}}/.aws:/home/vscode/.aws \
            -v {{.PWD}}/dotfiles:/chezmoi-source:ro \
            -v {{.CHEZMOI_STATE_DIR}}:/home/vscode/.config/chezmoi \
            {{.IMAGE}} sleep infinity
        fi
      - container exec {{.CONTAINER_NAME}} chezmoi apply --source /chezmoi-source

  switch:
    desc: "Stop all running persona containers and start a new one. Usage: task switch PERSONA=frontend"
    cmds:
      - |
        for persona in devops frontend qa; do
          container stop devcontainer-$persona 2>/dev/null || true
        done
      - task: up
        vars:
          PERSONA: '{{.PERSONA}}'

  down:
    desc: "Stop and remove a persona container. Usage: task down PERSONA=devops"
    cmds:
      - container stop {{.CONTAINER_NAME}} 2>/dev/null || true
      - container rm {{.CONTAINER_NAME}} 2>/dev/null || true

  restart:
    desc: "Restart a persona container (down then up). Usage: task restart PERSONA=devops"
    cmds:
      - task: down
        vars:
          PERSONA: '{{.PERSONA}}'
      - task: up
        vars:
          PERSONA: '{{.PERSONA}}'

  attach:
    desc: "Open a zsh shell in the running container"
    cmds:
      - container exec -it {{.CONTAINER_NAME}} zsh

  list-personas:
    desc: "List available personas"
    cmds:
      - ls containers/personas/*.mise.toml | xargs -I{} basename {} .mise.toml
